[auto_speed]
[include my_macros.cfg]
#[include adxl345.cfg]
#[include OrbiterSensor.cfg]

# This file contains pin mappings for the Creality "v4.2.7" board. To
# use this config, during "make menuconfig" select the STM32F103 with
# a "28KiB bootloader" and serial (on USART1 PA10/PA9) communication.

# If you prefer a direct serial connection, in "make menuconfig"
# select "Enable extra low-level configuration options" and select
# serial (on USART3 PB11/PB10), which is broken out on the 10 pin IDC
# cable used for the LCD module as follows:
# 3: Tx, 4: Rx, 9: GND, 10: VCC

# Flash this firmware by copying "out/klipper.bin" to a SD card and
# turning on the printer with the card inserted. The firmware
# filename must end in ".bin" and must not match the last filename
# that was flashed.

# See docs/Config_Reference.md for a description of parameters.


# [autotune_tmc stepper_x]
# motor: moons-c17hd2024n-01n
# [autotune_tmc stepper_y]
# motor: moons-c17hd2024n-01n

# [autotune_tmc stepper_z]
# motor: moons-c17hd2024n-01n

[mcu orbitoolO2S]
serial: /dev/serial/by-id/usb-Klipper_stm32f072xb_Orbitool_O2S-if00
restart_method: command


## STM32 MCU temp
[temperature_sensor toolboard]
sensor_type: temperature_mcu
sensor_mcu: orbitoolO2S


[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[mcu rpi]
serial: /tmp/klipper_host_mcu

[autotune_tmc extruder]
motor: moons-c17hd2024n-01n
tuning_goal: performance


[stepper_x]
step_pin: PB9
dir_pin: PC2
enable_pin: !PC3
microsteps: 16
rotation_distance: 39.73
endstop_pin: ^PA5
position_endstop: 0
position_max: 252
position_min: -10
homing_speed: 50


# [tmc2209 stepper_x]
# uart_pin: PC11
# run_current: 0.8
# hold_current: 0.4
# stealthchop_threshold: 999999
# diag_pin: null

[adc_temperature HOT_P]
temperature:120
voltage1:1.91
temperature:240
voltage2:3.82


[temperature_sensor Hotend_power]
sensor_pin: orbitoolO@S: PA0
sensor_type: HOT_P


[stepper_y]
step_pin: PB7
dir_pin: PB8
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 233
position_min: -10
homing_speed: 50


[stepper_z]
step_pin: PB5
dir_pin: !PB6
enable_pin: !PC3
#rotation_distance: 7.87
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
full_steps_per_rotation: 200    #200 for 1.8 degree, 400 for 0.9 degree
endstop_pin: ^PA7 #probe:z_virtual_endstop
position_endstop: 0.0
position_max: 250
position_min: -10.0



[extruder]
step_pin: orbitoolO2S:PB3
dir_pin: !orbitoolO2S:PB4
enable_pin: !orbitoolO2S:PC14
max_extrude_only_distance: 500
full_steps_per_rotation: 200
max_extrude_only_velocity: 120
pressure_advance: 0.03
pressure_advance_smooth_time: 0.03
microsteps: 16
rotation_distance: 4.637
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: orbitoolO2S:PB9
pullup_resistor: 2200
sensor_type: PT1000
sensor_pin: orbitoolO2S:PA1
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 300
max_extrude_cross_section: 60
min_extrude_temp: 180
smooth_time: 0.5
max_power: 0.995 # limit heater power to 99.5% to enable autorecovery from short detection



[tmc2240 extruder] 
uart_pin: orbitoolO2S:PC13
interpolate: false
run_current: 0.85 # Orbiter v2.5
rref: 12000
stealthchop_threshold: 0
#driver_TBL: 0
#driver_TOFF: 3
#driver_HEND: 8
#driver_HSTRT: 7

# [tmc2209 extruder]
# uart_pin: PA14
# run_current: 0.85
# hold_current: 0.100
# stealthchop_threshold: 0
# sense_resistor: 0.11 #**
# interpolate: True
# diag_pin: null

[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
pid_Kp: 65.713
pid_Ki: 1.605
pid_Kd: 672.734
min_temp: 0
max_temp: 130


[fan]
pin: !orbitoolO2S:PA10
enable_pin: orbitoolO2S:PB14
off_below: 0.2
shutdown_speed: 0.0
cycle_time: 0.0001
kick_start_time: 0.2
hardware_pwm: false

[heater_fan hotend_Fan]
pin: !orbitoolO2S:PB15
heater: extruder
cycle_time: 0.0001 
heater_temp: 65.0
fan_speed: 1.0
max_power: 1.0
hardware_pwm: false
shutdown_speed: 0.0
off_below: 0.3






[printer]
kinematics: cartesian
max_velocity: 600
max_accel: 5000
max_z_velocity: 5
max_z_accel: 100

[board_pins]
aliases:
    EXP1_1=PC6,EXP1_3=PB10,EXP1_5=PB14,EXP1_7=PB12,EXP1_9=<GND>,
    EXP1_2=PB2,EXP1_4=PB11,EXP1_6=PB13,EXP1_8=PB15,EXP1_10=<5V>,
    PROBE_IN=PB0,PROBE_OUT=PB1,FIL_RUNOUT=PA4
    
    
[include fluidd.cfg]


